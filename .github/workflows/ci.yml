name: MLflow Project CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project retraining
        run: |
          mlflow run MLProject --env-manager=local

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            MLProject/mlruns
            MLProject/outputs
          if-no-files-found: error

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Prepare Docker build context
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        working-directory: MLProject
        run: |
          RUN_ID=$(cat outputs/latest_run_id.txt)
          MODEL_PATH=$(find mlruns -path "*/$RUN_ID/artifacts/model" -type d | head -n 1)

          echo "RUN_ID=$RUN_ID"
          echo "MODEL_PATH=$MODEL_PATH"

          if [ -z "$MODEL_PATH" ] || [ ! -d "$MODEL_PATH" ]; then
            echo "Model artifact folder not found for RUN_ID: $RUN_ID"
            find mlruns -maxdepth 6 -type d
            exit 1
          fi

          rm -rf docker_model
          mkdir -p docker_model
          cp -r "$MODEL_PATH" docker_model/model

          printf '%s\n' \
          'import mlflow.pyfunc' \
          'import pandas as pd' \
          'from fastapi import FastAPI' \
          'from pydantic import BaseModel' \
          'from typing import List' \
          '' \
          'app = FastAPI(title="Breast Cancer MLflow Model API")' \
          'model = mlflow.pyfunc.load_model("model")' \
          '' \
          'class PredictRequest(BaseModel):' \
          '    data: List[List[float]]' \
          '' \
          '@app.get("/")' \
          'def root():' \
          '    return {"message": "MLflow model serving is running"}' \
          '' \
          '@app.post("/predict")' \
          'def predict(request: PredictRequest):' \
          '    df = pd.DataFrame(request.data)' \
          '    predictions = model.predict(df)' \
          '    return {"predictions": predictions.tolist()}' \
          > docker_model/app.py

          printf '%s\n' \
          'mlflow' \
          'fastapi' \
          'uvicorn' \
          'pandas' \
          'scikit-learn' \
          'numpy' \
          'cloudpickle' \
          'psutil' \
          'scipy' \
          > docker_model/requirements.txt

          printf '%s\n' \
          'FROM python:3.10-slim' \
          '' \
          'WORKDIR /app' \
          '' \
          'COPY requirements.txt .' \
          'RUN pip install --no-cache-dir -r requirements.txt' \
          '' \
          'COPY model ./model' \
          'COPY app.py .' \
          '' \
          'EXPOSE 8080' \
          '' \
          'CMD ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080"]' \
          > docker_model/Dockerfile

      - name: Build Docker image
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        working-directory: MLProject/docker_model
        run: |
          docker build -t "$DOCKER_USERNAME/breast-cancer-mlflow-ci:latest" .

      - name: Push Docker image to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        run: |
          docker push "$DOCKER_USERNAME/breast-cancer-mlflow-ci:latest"
